name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show runner context
        run: |
          whoami
          hostname
          pwd

      - name: Deploy application on Pi
        run: bash ./deploy/deploy.sh
