services:
  postgres:
    image: postgres:16-alpine
    container_name: todo-saas-postgres
    restart: unless-stopped
    env_file:
      - ./deploy/pi.env
    environment:
      POSTGRES_DB: todo_saas
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo_saas"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build:
      context: ./server
    container_name: todo-saas-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./deploy/pi.env
  web:
    build:
      context: .
      dockerfile: deploy/Caddy.Dockerfile
    container_name: todo-saas-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
